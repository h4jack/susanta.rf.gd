<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            height: 100vh;
            width: 100%;
        }

        main {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-content: center;
            width: 100%;
            max-width: 1000px;
            height: auto;
            text-align: justify;
            background-color: #131538;
            height: 100%;
            border: 0px;
            border-radius: 5px;
        }

        .toolbar {
            display: flex;
            padding: 5px;
            flex-direction: column;
            justify-content: center;
            align-items: start;
        }

        .tbar-bottom,
        .tbar-top {
            display: flex;
            flex-direction: row;
            justify-content: start;
            align-items: center;
        }

        .big-tool-dropdown,
        .post,
        .ticon {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 30px;
            width: 30px;
            margin: 5px;
            padding: 0px;
            text-align: center;
            background-color: white;
            background-repeat: no-repeat;
            background-size: contain;
            border-radius: 5px;
        }

        .post {
            padding-left: 15px;
            padding-right: 15px;
        }

        /* General styling for the dropdown container */
        .big-tool-dropdown {
            display: inline-block;
            position: relative;
            width: auto;
            cursor: pointer;
            /* Adding cursor style to indicate interactivity */
        }

        /* Styling for the top part of the dropdown */
        .dropdown-top {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ccc;
            width: auto;
            height: 100%;
            padding-left: 5px;
            padding-right: 5px;
            border-radius: 4px;
            background-color: #f9f9f9;
            transition: background-color 0.3s ease;
        }

        /* Change background color on hover for dropdown top */
        .dropdown-top:hover {
            background-color: #eaeaea;
        }

        /* Styling for the dropdown content */
        .dropdown-bottom {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 150%;
            overflow-y: auto;
            background-color: cadetblue;
            border: 1px solid #ccc;
            border-radius: 4px;
            z-index: 10;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .dropdown-bottom p {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 30px;
            width: 100%;
            margin: 0px;
            text-align: center;
        }

        .dropdown-bottom p:hover {
            background-color: #00000060;
        }

        .content {
            height: 100%;
        }

        .varticle-bar {
            width: 2px;
            height: 90%;
            background-color: white;
            box-shadow: 0px 0px 3px white;
            border-radius: 1px;
        }

        .svg-icon {
            height: 70%;
            width: auto;
            color: white;
        }

        .drop-down {
            height: 40%;
            width: 40%;
        }

        .select-font,
        .select-text-type {
            padding: 0px 5px;
            font-size: 13px;
        }

        .dropdown-bottom{
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
